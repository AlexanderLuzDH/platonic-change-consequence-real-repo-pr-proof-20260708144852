name: Enroll in the prospective Guard beta

description: Evaluate Busleyden Guard in a preregistered randomized trial on future public Python pull requests.

title: "Prospective beta: "

labels:
  - beta

body:
  - type: markdown
    attributes:
      value: |
        Thanks for pressure-testing Guard. This issue records enrollment before any eligible pull request is assigned.

        The trial compares delayed control, evidence-only, immediate obligations, and baseline-then-Guard presentation. It also audits a concealed probability sample of alert and no-alert PRs. Read the [preregistration](../../experiments/prospective-beta-v1/PREREGISTRATION.md) before enrolling.

        Do not include secrets, private code, personal information, or undisclosed vulnerability details.

  - type: input
    id: repository
    attributes:
      label: Public repository URL
      placeholder: https://github.com/owner/repository
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Your relationship to the repository
      options:
        - Owner or maintainer
        - Contributor authorized by a maintainer
    validations:
      required: true

  - type: textarea
    id: review_context
    attributes:
      label: Normal review context
      description: Describe the usual PR volume, reviewers, required CI, and decisions that Guard must not replace.
      placeholder: Two maintainers review 5–10 Python PRs per month; CI and security checks remain authoritative...
    validations:
      required: true

  - type: dropdown
    id: dependency_pr_policy
    attributes:
      label: Automated dependency-only PR policy
      description: Freeze this choice before the first assignment.
      options:
        - Exclude automated dependency-only PRs
        - Include automated dependency-only PRs as eligible
    validations:
      required: true

  - type: checkboxes
    id: design_agreement
    attributes:
      label: Prospective trial agreement
      options:
        - label: I have confirmed that the repository is listed in the active trial commitment and that enrollment occurs before any eligible PR is assigned.
          required: true
        - label: I agree that every future eligible PR will enter the ledger in creation order, including control assignments, failures, missing feedback, and withdrawals.
          required: true
        - label: I agree to concealed randomized presentation and understand that normal CI and human review continue in every arm.
          required: true
        - label: I agree to record a pre-exposure baseline when the assigned arm requires it.
          required: true
        - label: I agree that a concealed probability sample of alert and no-alert PRs may receive blinded independent adjudication using public artifacts.
          required: true
        - label: I understand that subjective “Useful/Noisy” feedback is secondary; obligation-level labels and audited missed risks are the primary evidence.
          required: true

  - type: textarea
    id: risk_scope
    attributes:
      label: Repository-specific risk and evidence scope
      description: What kinds of changes, evidence, and review failures matter in this repository?
      placeholder: Authentication behavior, migration compatibility, release recovery, focused regression tests...
    validations:
      required: true

  - type: checkboxes
    id: public_evidence
    attributes:
      label: Public evidence and privacy
      options:
        - label: I agree that public PR URLs, treatment timing, de-identified labels, and maintainer-authored summaries may be included in the public trial record.
          required: true
        - label: I will not post secrets, private code, exploit details, personal data, or information unsuitable for a public issue.
          required: true
        - label: I understand that there is no card, sales call, support SLA, or automatic paid conversion.
          required: true
