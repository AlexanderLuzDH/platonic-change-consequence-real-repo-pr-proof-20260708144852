name: autonomous-assurance-lab-v1

on:
  pull_request:
    paths:
      - ".github/workflows/autonomous-assurance-v1.yml"
      - "experiments/autonomous-assurance-v1/**"
  push:
    branches:
      - agent/autonomous-assurance-lab-v1
    paths:
      - ".github/workflows/autonomous-assurance-v1.yml"
      - "experiments/autonomous-assurance-v1/**"
  workflow_dispatch:

concurrency:
  group: autonomous-assurance-v1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Clone frozen BugsInPy outcome corpus
        run: |
          git clone --depth 1 https://github.com/soarsmu/BugsInPy.git /tmp/BugsInPy
          test "$(git -C /tmp/BugsInPy rev-parse HEAD)" = "11c5f1eea954a42132cfd06bf257766a7963e0fd"
      - name: Run laboratory unit tests
        run: python -m unittest discover -s experiments/autonomous-assurance-v1/tests -v
      - name: Finalize 500-case audit from immutable seed and five public HTTPie reads
        run: |
          mkdir -p results/static
          python experiments/autonomous-assurance-v1/run_final_static.py /tmp/BugsInPy \
            --json-output results/static/bugsinpy-static.json \
            --markdown-output results/static/bugsinpy-static.md \
            --csv-output results/static/httpie-new-cases.csv
          cp experiments/autonomous-assurance-v1/PREREGISTRATION.md results/static/
          cp experiments/autonomous-assurance-v1/AMENDMENT-001.md results/static/
          cp experiments/autonomous-assurance-v1/AMENDMENT-002.md results/static/
          cp experiments/autonomous-assurance-v1/AMENDMENT-003.md results/static/
          cp experiments/autonomous-assurance-v1/seed-495-project-counts.json results/static/
          git -C /tmp/BugsInPy rev-parse HEAD > results/static/bugsinpy-commit.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autonomous-assurance-v1-static
          retention-days: 90
          if-no-files-found: error
          path: results/static

  executable-primary:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install pinned historical PySnooper dependencies
        run: python -m pip install --disable-pip-version-check future==0.18.3 six==1.16.0 decorator==4.4.2
      - name: Run property-aligned PySnooper counterfactuals
        run: |
          mkdir -p results/executable-primary
          python experiments/autonomous-assurance-v1/run_corrected_pysnooper.py \
            --python python \
            --json-output results/executable-primary/pysnooper-executable.json \
            --markdown-output results/executable-primary/pysnooper-executable.md
          python --version > results/executable-primary/python-version.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autonomous-assurance-v1-executable-python38
          retention-days: 90
          if-no-files-found: error
          path: results/executable-primary

  executable-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned historical PySnooper dependencies
        run: python -m pip install --disable-pip-version-check future==0.18.3 six==1.16.0 decorator==4.4.2
      - name: Run transfer environment without gating the primary workflow
        shell: bash
        run: |
          mkdir -p results/executable-transfer
          set +e
          python experiments/autonomous-assurance-v1/run_corrected_pysnooper.py \
            --python python \
            --json-output results/executable-transfer/pysnooper-executable.json \
            --markdown-output results/executable-transfer/pysnooper-executable.md
          status=$?
          printf '%s\n' "$status" > results/executable-transfer/experiment-exit-status.txt
          python --version > results/executable-transfer/python-version.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autonomous-assurance-v1-executable-python311-transfer
          retention-days: 90
          if-no-files-found: error
          path: results/executable-transfer

  dynamic-mapping-primary:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install pinned historical PySnooper dependencies
        run: python -m pip install --disable-pip-version-check future==0.18.3 six==1.16.0 decorator==4.4.2
      - name: Run preregistered dynamic mapping pilot
        run: |
          mkdir -p results/dynamic-mapping
          python experiments/autonomous-assurance-v1/run_dynamic_mapping_pilot.py \
            --python python \
            --json-output results/dynamic-mapping/dynamic-mapping.json \
            --markdown-output results/dynamic-mapping/dynamic-mapping.md
          cp experiments/autonomous-assurance-v1/DYNAMIC-MAPPING-PREREGISTRATION.md results/dynamic-mapping/
          python --version > results/dynamic-mapping/python-version.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autonomous-assurance-v1-dynamic-mapping-python38
          retention-days: 90
          if-no-files-found: error
          path: results/dynamic-mapping
