name: change-consequence-certificate

on:
  workflow_dispatch:
    inputs:
      pull_number:
        description: "Pull request number dispatched by Busleyden Guard"
        required: true
      base:
        description: "Pull request base commit SHA"
        required: true
      head:
        description: "Pull request head commit SHA"
        required: true
      changed_files:
        description: "Newline-separated changed files"
        required: true
      source:
        description: "Dispatch source"
        required: false
        default: "github_app_webhook"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: busleyden-guard-${{ github.repository }}-${{ inputs.pull_number }}
  cancel-in-progress: true

jobs:
  certificate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.head }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - name: Verify dispatch inputs
        continue-on-error: true
        env:
          BASE_SHA: ${{ inputs.base }}
          HEAD_SHA: ${{ inputs.head }}
          CHANGED_FILES_INPUT: ${{ inputs.changed_files }}
        run: |
          printf '%s\n' "$CHANGED_FILES_INPUT" | sed '/^[[:space:]]*$/d' | sort -u > changed-files.txt
          test -n "$BASE_SHA"
          test -n "$HEAD_SHA"
          test -n "$CHANGED_FILES_INPUT"
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"

      - name: Install pinned scanners
        id: scanner-install
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check "semgrep==1.168.0"
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run Semgrep
        continue-on-error: true
        run: semgrep scan --config auto --json --json-output semgrep.json .

      - name: Run OSV-Scanner
        continue-on-error: true
        run: osv-scanner scan source -r . --format json > osv.json

      - name: Read pull request approvals
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_number }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews?per_page=100" > reviews.json || printf '[]\n' > reviews.json

      - name: Run hash-verified Guard engine
        id: guard
        env:
          BASE_SHA: ${{ inputs.base }}
          HEAD_SHA: ${{ inputs.head }}
          PR_NUMBER: ${{ inputs.pull_number }}
          ENGINE_SHA256: 9fb8b150812efa7e25cc90e974b1596ab7b5c38b99143da7d88aa92eaba071cc
        run: |
          set +e
          curl --fail --silent --show-error --location \
            https://www.busleyden.com/guard-engine-v1.py \
            --output guard-engine-v1.py
          download_status=$?
          if [ "$download_status" -eq 0 ]; then
            printf '%s  %s\n' "$ENGINE_SHA256" guard-engine-v1.py | sha256sum --check --status
            integrity_status=$?
          else
            integrity_status=1
          fi
          if [ "$integrity_status" -eq 0 ]; then
            python guard-engine-v1.py \
              --repo-root . \
              --base "$BASE_SHA" \
              --head "$HEAD_SHA" \
              --repository "$GITHUB_REPOSITORY" \
              --pull-number "$PR_NUMBER" \
              --changed-files-file changed-files.txt \
              --semgrep-report semgrep.json \
              --osv-report osv.json \
              --reviews-report reviews.json \
              --certificate-output change-consequence.json \
              --passport-output change-merge-passport.json \
              --check-output busleyden-check-run.json \
              --comment-output change-consequence.md
            engine_status=$?
          else
            engine_status=1
          fi
          if [ "$engine_status" -ne 0 ]; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          head = os.environ["HEAD_SHA"]
          check = {
              "name": "Busleyden Guard",
              "head_sha": head,
              "status": "completed",
              "conclusion": "failure",
              "output": {
                  "title": "Guard infrastructure proof required",
                  "summary": "Guard failed closed because its versioned engine could not be downloaded, integrity-verified, or executed. Rerun the check; do not merge from this result.",
                  "annotations": [],
              },
          }
          certificate = {
              "schema_version": 2,
              "kind": "busleyden_guard_infrastructure_failure",
              "head": head,
              "status": "proof_required",
              "claim_boundary": "No repository consequence decision was produced.",
          }
          Path("busleyden-check-run.json").write_text(json.dumps(check), encoding="utf-8")
          Path("change-consequence.json").write_text(json.dumps(certificate, indent=2), encoding="utf-8")
          Path("change-merge-passport.json").write_text(json.dumps({"status": "proof_required"}, indent=2), encoding="utf-8")
          Path("change-consequence.md").write_text(
              "<!-- busleyden-guard -->\n# Busleyden Guard\n\nEngine integrity or execution failed. Guard failed closed; do not merge from this result.\n",
              encoding="utf-8",
          )
          PY
          fi
          printf 'engine_status=%s\n' "$engine_status" >> "$GITHUB_OUTPUT"

      - name: Publish final Busleyden Guard Check Run
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/check-runs" --method POST --input busleyden-check-run.json

      - name: Publish or update the Guard pull request comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_number }}
        run: |
          if ! grep -q '<!-- busleyden-guard -->' change-consequence.md; then
            printf '%s\n' '<!-- busleyden-guard -->' | cat - change-consequence.md > change-consequence.tmp
            mv change-consequence.tmp change-consequence.md
          fi
          printf '\n---\nWas this decision useful? React to this comment with +1 or -1.\n' >> change-consequence.md
          comment_id=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- busleyden-guard -->")) | .id' | head -n 1)
          jq -Rs '{body: .}' change-consequence.md > comment-request.json
          if [ -n "$comment_id" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" --method PATCH --input comment-request.json
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --method POST --input comment-request.json
          fi

      - name: Upload consequence evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: busleyden-guard-${{ inputs.pull_number }}-${{ inputs.head }}
          retention-days: 30
          if-no-files-found: error
          path: |
            change-consequence.json
            change-consequence.md
            change-merge-passport.json
            busleyden-check-run.json
            semgrep.json
            osv.json
            reviews.json
